name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

env:
  # Pinned fingerprint of the maintainer's release-signing key. This is
  # checked in addition to `git verify-tag` succeeding, so that widening
  # .github/allowed_signers to a new key can't silently widen trust here.
  RELEASE_SIGNER_FINGERPRINT: "SHA256:yrqOXw6sWZGPKON9mJJvjhsBKTgMzsn3VTGdNL5mxKU"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Verify tag is signed by the trusted release key
        shell: bash
        run: |
          set -uo pipefail

          git config gpg.ssh.allowedSignersFile .github/allowed_signers

          # `2>&1 1>/dev/null` captures ONLY stderr (where git writes its
          # own signature-status line) and discards stdout, so a tag
          # body/message (which `-v` would print to stdout — we never pass
          # `-v`) can never end up in VERIFY_OUTPUT regardless of git
          # version.
          VERIFY_OUTPUT="$(git verify-tag "$GITHUB_REF_NAME" 2>&1 1>/dev/null)"
          VERIFY_EXIT=$?
          echo "$VERIFY_OUTPUT"

          if [ "$VERIFY_EXIT" -ne 0 ]; then
            echo "::error::git verify-tag failed for $GITHUB_REF_NAME - refusing to release an unsigned or untrusted tag"
            exit 1
          fi

          # Anchored to git's own "with <algo> key SHA256:..." phrase
          # instead of a plain substring search, so a fingerprint injected
          # elsewhere (e.g. a crafted tag message) can never be picked up
          # in place of the actually-verified key.
          TAG_FPR="$(printf '%s\n' "$VERIFY_OUTPUT" | grep -oE 'with [A-Za-z0-9-]+ key SHA256:[A-Za-z0-9+/=]+' | grep -oE 'SHA256:[A-Za-z0-9+/=]+' | head -1)"

          if [ -z "$TAG_FPR" ] || [ "$TAG_FPR" != "$RELEASE_SIGNER_FINGERPRINT" ]; then
            echo "::error::Tag $GITHUB_REF_NAME did not verify against the pinned release-signing key fingerprint ($RELEASE_SIGNER_FINGERPRINT)"
            exit 1
          fi

          echo "Verified: $GITHUB_REF_NAME is signed by the pinned release-signing key."

      - name: Verify tag version matches utils/config.py
        shell: bash
        run: |
          set -euo pipefail

          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CODE_VERSION="$(sed -n 's/^__version__ = "\(.*\)"/\1/p' utils/config.py)"

          if [ -z "$CODE_VERSION" ]; then
            echo "::error::Could not parse __version__ from utils/config.py"
            exit 1
          fi

          if [ "$TAG_VERSION" != "$CODE_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match utils/config.py __version__ ($CODE_VERSION)"
            exit 1
          fi

          echo "Tag version matches __version__ ($CODE_VERSION)."

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail

          PREV_TAG="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"

          {
            if [ -n "$PREV_TAG" ]; then
              echo "## Changes since $PREV_TAG"
              echo
              git log "${PREV_TAG}..${GITHUB_REF_NAME}" --no-merges --pretty=format:'- %s (%h)'
            else
              echo "## Changes"
              echo
              echo "Initial tracked release."
              git log "$GITHUB_REF_NAME" --no-merges --pretty=format:'- %s (%h)'
            fi
            echo
          } > release-notes.md

          cat release-notes.md

      - name: Build source archive
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"
          PREFIX="curatarr-${VERSION}/"
          ARCHIVE="curatarr-${VERSION}.tar.gz"

          git archive --format=tar.gz --prefix="$PREFIX" -o "$ARCHIVE" "$GITHUB_REF_NAME"
          sha256sum "$ARCHIVE" > SHA256SUMS.txt

          cat SHA256SUMS.txt

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"

          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            "curatarr-${VERSION}.tar.gz" \
            "SHA256SUMS.txt"

  # ---------------------------------------------------------------------
  # Standalone per-OS binaries (PyInstaller --onefile, see curatarr.spec
  # and docs/BINARIES.md). `needs: release` is the whole gate here - the
  # `release` job above is the single source of truth for "is this a
  # legitimate release" (signed tag + pinned fingerprint + version
  # match), so this job only runs at all once that one has succeeded.
  # No independent re-verification here on purpose - one gate, not two
  # that could drift out of sync.
  #
  # macOS is deliberately NOT in this matrix - see build-macos-universal
  # below. It needs a different toolchain (a universal2 Python instead
  # of actions/setup-python's single-arch macOS builds), so it can't
  # share these steps.
  # ---------------------------------------------------------------------
  build-binaries:
    name: Build binary (${{ matrix.asset_name }})
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset_name: curatarr-windows-x86_64.exe
            dist_name: curatarr.exe
          - os: ubuntu-latest
            asset_name: curatarr-linux-x86_64
            dist_name: curatarr
          - os: ubuntu-24.04-arm
            asset_name: curatarr-linux-arm64
            dist_name: curatarr
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-ui.txt -r build-requirements.txt

      - name: Build binary with PyInstaller
        shell: bash
        run: |
          set -euo pipefail
          pyinstaller --clean --noconfirm curatarr.spec

      - name: Rename binary and compute SHA256
        shell: bash
        env:
          ASSET_NAME: ${{ matrix.asset_name }}
          DIST_NAME: ${{ matrix.dist_name }}
        run: |
          set -euo pipefail
          mv "dist/$DIST_NAME" "$ASSET_NAME"
          python -c "
          import hashlib, os
          path = os.environ['ASSET_NAME']
          h = hashlib.sha256()
          with open(path, 'rb') as f:
              for chunk in iter(lambda: f.read(1 << 20), b''):
                  h.update(chunk)
          with open(path + '.sha256', 'w') as out:
              out.write(f'{h.hexdigest()}  {path}\n')
          "
          cat "$ASSET_NAME.sha256"

      - name: Upload binary to the release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ASSET_NAME: ${{ matrix.asset_name }}
        run: |
          set -euo pipefail
          gh release upload "$GITHUB_REF_NAME" \
            "$ASSET_NAME" \
            "$ASSET_NAME.sha256" \
            --clobber

  # ---------------------------------------------------------------------
  # macOS universal2 binary - one file that runs natively on both Intel
  # and Apple Silicon Macs, replacing the old two-job split (a
  # macos-latest arm64-only build + a macos-13 Intel-only build that had
  # started stalling on GitHub's macos-13 runner capacity).
  #
  # This can't reuse the build-binaries matrix above because
  # actions/setup-python's macOS Python builds are single-arch only -
  # separate darwin-arm64 and darwin-x64 downloads, never a universal2
  # one (see actions/python-versions' versions-manifest.json) - so a
  # universal2 PyInstaller build needs python.org's own official
  # universal2 installer instead, installed system-wide (GitHub-hosted
  # runners have passwordless sudo) so its hardcoded
  # /Library/Frameworks/Python.framework install-name references
  # resolve correctly.
  #
  # A handful of curatarr's macOS dependencies also don't publish a
  # macosx_*_universal2 wheel on PyPI - only separate x86_64/arm64 ones
  # (pyyaml, ruamel.yaml.clib, markupsafe, and cffi, as of the versions
  # pinned in requirements.txt/requirements-ui.txt - checked directly
  # against PyPI's JSON API). Those get downloaded as both single-arch
  # wheels and fused into a real universal2 wheel with `delocate-merge`
  # (from the `delocate` package) before the PyInstaller build runs. If
  # a future dependency bump adds another compiled-extension package
  # without a universal2 wheel, this job will fail loudly at the
  # PyInstaller step (single-arch .so bundled into a universal2 EXE)
  # rather than silently shipping a broken binary - see the "Verify the
  # binary is truly universal2" step below, which is exactly the same
  # lipo check used to prove this locally.
  #
  # cffi is transitive (pulled in by cryptography, added in v2.8.29 for
  # the self-update signature verifier) and was missed here the first
  # time - it doesn't ship a universal2 wheel either, only thin
  # cp<NN>-cp<NN> per-Python-version x86_64/arm64 wheels (unlike
  # cryptography itself, which is NOT in this list: 48.0.1, the version
  # pinned in requirements.txt, ships a real prebuilt universal2 wheel
  # already - no fuse needed for it). This is exactly what broke the
  # v2.8.29 release: the job DID fail loudly as designed, just on
  # cryptography's own single-arch (49.0.0 dropped macOS x86_64
  # entirely) rather than on this transitive dep - see PR #190.
  #
  # Verified locally on Apple Silicon (M1) before this job was written:
  # `lipo -archs dist/curatarr` -> "x86_64 arm64", a native arm64 launch
  # served HTTP 200, and `arch -x86_64 ./dist/curatarr` (Rosetta) also
  # served HTTP 200 (confirmed via `vmmap` showing "Code Type: X86-64
  # (translated)").
  # ---------------------------------------------------------------------
  build-macos-universal:
    name: Build binary (curatarr-macos-universal)
    needs: release
    runs-on: macos-latest
    env:
      # Latest 3.12.x for which python.org still publishes a macOS
      # universal2 installer (.pkg) - 3.12.11+ dropped it, source-only.
      # SHA256 pinned against the exact file downloaded from
      # python.org's own https:// (defense in depth beyond TLS, same
      # pinning convention as requirements.lock). Bump deliberately.
      PYTHON_VERSION: "3.12.10"
      PYTHON_PKG_SHA256: "8373e58da4ea146b3eb1c1f9834f19a319440b6b679b06050b1f9ee3237aa8e4"
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install python.org universal2 Python
        shell: bash
        run: |
          set -euo pipefail
          curl -sL -o python-universal2.pkg \
            "https://www.python.org/ftp/python/${PYTHON_VERSION}/python-${PYTHON_VERSION}-macos11.pkg"
          echo "${PYTHON_PKG_SHA256}  python-universal2.pkg" | shasum -a 256 -c -
          sudo installer -pkg python-universal2.pkg -target /

          PY_BIN="/Library/Frameworks/Python.framework/Versions/3.12/bin/python3.12"
          echo "PYTHON_BIN=$PY_BIN" >> "$GITHUB_ENV"
          "$PY_BIN" --version
          echo "python3.12 archs: $(lipo -archs "$PY_BIN")"

      - name: Create venv and install dependencies
        shell: bash
        run: |
          set -euo pipefail
          "$PYTHON_BIN" -m venv .venv-universal2
          source .venv-universal2/bin/activate
          python -m pip install --upgrade pip
          pip install delocate
          pip install -r requirements.txt -r requirements-ui.txt -r build-requirements.txt

      - name: Fuse single-arch-only wheels into universal2
        shell: bash
        run: |
          set -euo pipefail
          source .venv-universal2/bin/activate
          mkdir -p fuse/arm64 fuse/x86_64 fuse/out

          # Single-arch-only-on-PyPI deps that need delocate-merge fusing
          # into a universal2 wheel - see the job comment above.
          THIN_WHEEL_DEPS=(pyyaml==6.0.3 ruamel.yaml.clib==0.2.15 markupsafe==3.0.3 cffi==2.1.0)

          pip download --no-deps --only-binary=:all: --python-version 312 \
            --implementation cp --platform macosx_11_0_arm64 \
            -d fuse/arm64 "${THIN_WHEEL_DEPS[@]}"

          # x86_64 wheels for these deps use different minimum-macOS-version
          # platform tags depending on the package - checked directly
          # against PyPI (pip's --platform match is an EXACT tag match,
          # not a compatibility range, so a single shared tag can't fetch
          # all of them): pyyaml/ruamel.yaml.clib/markupsafe publish
          # macosx_10_13_x86_64; cffi publishes macosx_10_15_x86_64.
          pip download --no-deps --only-binary=:all: --python-version 312 \
            --implementation cp --platform macosx_10_13_x86_64 \
            -d fuse/x86_64 pyyaml==6.0.3 ruamel.yaml.clib==0.2.15 markupsafe==3.0.3
          pip download --no-deps --only-binary=:all: --python-version 312 \
            --implementation cp --platform macosx_10_15_x86_64 \
            -d fuse/x86_64 cffi==2.1.0

          for arm_whl in fuse/arm64/*.whl; do
            base="$(basename "$arm_whl")"
            prefix="${base%-macosx_*}"
            x86_whl="$(ls fuse/x86_64/${prefix}-macosx_*x86_64.whl)"
            echo "fusing: $arm_whl + $x86_whl"
            delocate-merge "$arm_whl" "$x86_whl" -w fuse/out
          done

          pip install --force-reinstall --no-deps fuse/out/*.whl

      - name: Build binary with PyInstaller (universal2)
        shell: bash
        run: |
          set -euo pipefail
          source .venv-universal2/bin/activate
          PYINSTALLER_TARGET_ARCH=universal2 pyinstaller --clean --noconfirm curatarr.spec

      - name: Verify the binary is truly universal2
        shell: bash
        run: |
          set -euo pipefail
          ARCHES="$(lipo -archs dist/curatarr)"
          echo "dist/curatarr archs: $ARCHES"
          echo "$ARCHES" | grep -q x86_64
          echo "$ARCHES" | grep -q arm64

      - name: Rename binary and compute SHA256
        shell: bash
        run: |
          set -euo pipefail
          mv dist/curatarr curatarr-macos-universal
          shasum -a 256 curatarr-macos-universal > curatarr-macos-universal.sha256
          cat curatarr-macos-universal.sha256

      - name: Upload binary to the release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "$GITHUB_REF_NAME" \
            curatarr-macos-universal \
            curatarr-macos-universal.sha256 \
            --clobber

  # ---------------------------------------------------------------------
  # Aggregate every asset's checksum into ONE SHA256SUMS.txt covering the
  # source archive AND all four binaries (the `release` job's own
  # SHA256SUMS.txt only ever covered the source archive - the binaries
  # aren't built until the jobs above, which run after it). This is what
  # the in-binary self-updater (utils/self_update.py) actually verifies
  # against: it downloads SHA256SUMS.txt + SHA256SUMS.txt.sig and checks
  # its target asset's hash against THIS file, not any of the individual
  # `<asset>.sha256` sidecars - see docs/BINARIES.md and RELEASING.md.
  #
  # `needs: [release, build-binaries, build-macos-universal]` is a hard
  # gate, same reasoning as build-binaries' own comment: if ANY platform
  # failed to build, this job is skipped entirely rather than publishing
  # a SHA256SUMS.txt that's silently missing an asset - a self-updater
  # verifying against an incomplete-but-present sums file would fail
  # closed anyway (HashMismatchError: "not listed"), but never even
  # publishing it here is cleaner than a partial one existing at all.
  #
  # Deliberately does NOT sign SHA256SUMS.txt itself - the private
  # signing key never touches CI (see RELEASING.md). Signing happens
  # offline afterward: scripts/sign-release-checksums.sh, run by the
  # maintainer on the machine that holds
  # ~/.ssh/curatarr_release_signing, downloads exactly this file,
  # signs it with `ssh-keygen -Y sign`, and uploads SHA256SUMS.txt.sig
  # as a follow-up release asset.
  # ---------------------------------------------------------------------
  finalize-checksums:
    name: Aggregate SHA256SUMS.txt (source archive + all binaries)
    needs: [release, build-binaries, build-macos-universal]
    runs-on: ubuntu-latest
    steps:
      # This job's own `gh release download`/`gh release upload` calls
      # below rely on `gh` auto-detecting owner/repo from the checked-out
      # git remote, same as every other `gh release` call in this
      # workflow (see `release`/`build-binaries`/`build-macos-universal`
      # above) - none of them pass `--repo` explicitly. This job was
      # missing its own Checkout step (the only job in this workflow that
      # was), so `gh` had no repo to resolve and failed with "fatal: not
      # a git repository" the first time this job actually ran (v2.8.29 -
      # it was added alongside the self-update feature and had never
      # been exercised by a real release tag before that).
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Download existing SHA256SUMS.txt and every per-binary .sha256 sidecar
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p checksums
          gh release download "$GITHUB_REF_NAME" -p 'SHA256SUMS.txt' -D checksums
          gh release download "$GITHUB_REF_NAME" -p '*.sha256' -D checksums
          ls -la checksums

      - name: Build the aggregate SHA256SUMS.txt
        shell: bash
        run: |
          set -euo pipefail
          # Sorted + de-duplicated so re-running this job (e.g. a re-run
          # of a flaky matrix job) is idempotent rather than appending
          # duplicate lines.
          cat checksums/SHA256SUMS.txt checksums/*.sha256 | sort -u -k2 > SHA256SUMS.txt
          echo "Aggregate SHA256SUMS.txt:"
          cat SHA256SUMS.txt
          # Sanity check: every platform asset this release published a
          # .sha256 sidecar for must appear in the aggregate - a job that
          # silently produced an incomplete file is worse than one that
          # fails loudly here.
          for f in checksums/*.sha256; do
            name="$(basename "$f" .sha256)"
            grep -qF "  ${name}" SHA256SUMS.txt || {
              echo "::error::${name} missing from aggregated SHA256SUMS.txt"
              exit 1
            }
          done

      - name: Upload the aggregate SHA256SUMS.txt
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "$GITHUB_REF_NAME" SHA256SUMS.txt --clobber
