name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

env:
  # Pinned fingerprint of the maintainer's release-signing key. This is
  # checked in addition to `git verify-tag` succeeding, so that widening
  # .github/allowed_signers to a new key can't silently widen trust here.
  RELEASE_SIGNER_FINGERPRINT: "SHA256:yrqOXw6sWZGPKON9mJJvjhsBKTgMzsn3VTGdNL5mxKU"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Verify tag is signed by the trusted release key
        shell: bash
        run: |
          set -uo pipefail

          git config gpg.ssh.allowedSignersFile .github/allowed_signers

          # `2>&1 1>/dev/null` captures ONLY stderr (where git writes its
          # own signature-status line) and discards stdout, so a tag
          # body/message (which `-v` would print to stdout — we never pass
          # `-v`) can never end up in VERIFY_OUTPUT regardless of git
          # version.
          VERIFY_OUTPUT="$(git verify-tag "$GITHUB_REF_NAME" 2>&1 1>/dev/null)"
          VERIFY_EXIT=$?
          echo "$VERIFY_OUTPUT"

          if [ "$VERIFY_EXIT" -ne 0 ]; then
            echo "::error::git verify-tag failed for $GITHUB_REF_NAME - refusing to release an unsigned or untrusted tag"
            exit 1
          fi

          # Anchored to git's own "with <algo> key SHA256:..." phrase
          # instead of a plain substring search, so a fingerprint injected
          # elsewhere (e.g. a crafted tag message) can never be picked up
          # in place of the actually-verified key.
          TAG_FPR="$(printf '%s\n' "$VERIFY_OUTPUT" | grep -oE 'with [A-Za-z0-9-]+ key SHA256:[A-Za-z0-9+/=]+' | grep -oE 'SHA256:[A-Za-z0-9+/=]+' | head -1)"

          if [ -z "$TAG_FPR" ] || [ "$TAG_FPR" != "$RELEASE_SIGNER_FINGERPRINT" ]; then
            echo "::error::Tag $GITHUB_REF_NAME did not verify against the pinned release-signing key fingerprint ($RELEASE_SIGNER_FINGERPRINT)"
            exit 1
          fi

          echo "Verified: $GITHUB_REF_NAME is signed by the pinned release-signing key."

      - name: Verify tag version matches utils/config.py
        shell: bash
        run: |
          set -euo pipefail

          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CODE_VERSION="$(sed -n 's/^__version__ = "\(.*\)"/\1/p' utils/config.py)"

          if [ -z "$CODE_VERSION" ]; then
            echo "::error::Could not parse __version__ from utils/config.py"
            exit 1
          fi

          if [ "$TAG_VERSION" != "$CODE_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match utils/config.py __version__ ($CODE_VERSION)"
            exit 1
          fi

          echo "Tag version matches __version__ ($CODE_VERSION)."

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail

          PREV_TAG="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"

          {
            if [ -n "$PREV_TAG" ]; then
              echo "## Changes since $PREV_TAG"
              echo
              git log "${PREV_TAG}..${GITHUB_REF_NAME}" --no-merges --pretty=format:'- %s (%h)'
            else
              echo "## Changes"
              echo
              echo "Initial tracked release."
              git log "$GITHUB_REF_NAME" --no-merges --pretty=format:'- %s (%h)'
            fi
            echo
          } > release-notes.md

          cat release-notes.md

      - name: Build source archive
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"
          PREFIX="curatarr-${VERSION}/"
          ARCHIVE="curatarr-${VERSION}.tar.gz"

          git archive --format=tar.gz --prefix="$PREFIX" -o "$ARCHIVE" "$GITHUB_REF_NAME"
          sha256sum "$ARCHIVE" > SHA256SUMS.txt

          cat SHA256SUMS.txt

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"

          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            "curatarr-${VERSION}.tar.gz" \
            "SHA256SUMS.txt"

  # ---------------------------------------------------------------------
  # Standalone per-OS binaries (PyInstaller --onefile, see curatarr.spec
  # and docs/BINARIES.md). `needs: release` is the whole gate here - the
  # `release` job above is the single source of truth for "is this a
  # legitimate release" (signed tag + pinned fingerprint + version
  # match), so this job only runs at all once that one has succeeded.
  # No independent re-verification here on purpose - one gate, not two
  # that could drift out of sync.
  # ---------------------------------------------------------------------
  build-binaries:
    name: Build binary (${{ matrix.asset_name }})
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset_name: curatarr-windows-x86_64.exe
            dist_name: curatarr.exe
          - os: macos-latest
            asset_name: curatarr-macos-arm64
            dist_name: curatarr
          - os: macos-13
            asset_name: curatarr-macos-x86_64
            dist_name: curatarr
          - os: ubuntu-latest
            asset_name: curatarr-linux-x86_64
            dist_name: curatarr
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-ui.txt -r build-requirements.txt

      - name: Build binary with PyInstaller
        shell: bash
        run: |
          set -euo pipefail
          pyinstaller --clean --noconfirm curatarr.spec

      - name: Rename binary and compute SHA256
        shell: bash
        env:
          ASSET_NAME: ${{ matrix.asset_name }}
          DIST_NAME: ${{ matrix.dist_name }}
        run: |
          set -euo pipefail
          mv "dist/$DIST_NAME" "$ASSET_NAME"
          python -c "
          import hashlib, os
          path = os.environ['ASSET_NAME']
          h = hashlib.sha256()
          with open(path, 'rb') as f:
              for chunk in iter(lambda: f.read(1 << 20), b''):
                  h.update(chunk)
          with open(path + '.sha256', 'w') as out:
              out.write(f'{h.hexdigest()}  {path}\n')
          "
          cat "$ASSET_NAME.sha256"

      - name: Upload binary to the release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ASSET_NAME: ${{ matrix.asset_name }}
        run: |
          set -euo pipefail
          gh release upload "$GITHUB_REF_NAME" \
            "$ASSET_NAME" \
            "$ASSET_NAME.sha256" \
            --clobber
