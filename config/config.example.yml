# Curatarr Configuration
# Core settings for Plex recommendations

# Plex Server Connection
plex:
  url: http://YOUR_PLEX_URL:32400  # Or https://YOUR-SERVER.plex.direct:32400
  token: YOUR_PLEX_TOKEN  # Get from: https://support.plex.tv/articles/204059436
  movie_library: Movies
  tv_library: TV Shows

# TMDB API (required for metadata)
tmdb:
  api_key: YOUR_TMDB_API_KEY  # Get free key from: https://www.themoviedb.org/settings/api

# Users and Preferences
users:
  list: user1, user2, kids  # Plex usernames (comma-separated)
  preferences:
    user1:
      display_name: User One
      exclude_genres:  # Optional: genres to exclude
        - horror
      streaming_services:  # Optional: for external recommendations
        - netflix
        - disney_plus
    user2:
      display_name: User Two
      max_rating: PG-13  # Filter out R and NC-17 movies
    kids:
      display_name: Kids
      exclude_genres:
        - horror
        - thriller
      max_rating: PG  # Only G and PG content
      # Content ratings: Movies (G < PG < PG-13 < R < NC-17)
      #                  TV (TV-Y < TV-Y7 < TV-G < TV-PG < TV-14 < TV-MA)

# General Settings
general:
  plex_only: true  # Only recommend from Plex library
  log_retention_days: 7
  # notify (default): show a one-line CLI notice / web UI banner when a
  #   newer release exists, never applies anything automatically.
  # force: auto-apply verified signed updates on launch, no prompt
  #   (source installs only - see run.sh/run.ps1).
  # off: never check for updates.
  update_mode: notify

# Huntarr: Find missing/upcoming movies from collections
huntarr:
  sequel_huntarr: true    # Missing movies from collections you've started
  horizon_huntarr: true   # Upcoming unreleased movies from collections you own

# Optional: Logging level
logging:
  level: INFO  # DEBUG, INFO, WARNING, ERROR

# Optional: Multi-library support
# Define one entry per Plex library you want Curatarr to manage separately
# (e.g. "Movies" and "Kids Movies", or "TV Shows" and "Anime"). Each entry's
# `arr` block is optional - any field left out falls back to the matching
# global radarr.yml/sonarr.yml setting for that media_type. `instance` is
# also optional, for routing a specific library to its own *arr instance
# instead of the default one configured in radarr.yml/sonarr.yml.
# If this section is omitted entirely, Curatarr falls back to the single
# movie_library/tv_library above (unchanged legacy behavior).
# libraries:
#   - id: movies              # stable slug; auto-derived from name if omitted
#     name: Movies
#     section: Movies          # Plex section title
#     media_type: movie        # movie | tv
#     arr:                     # optional; each field falls back to global sonarr/radarr
#       root_folder: /data/movies
#       quality_profile: HD-1080p
#       tag: Curatarr
#       monitor: false
#       search: false
#       minimum_availability: released   # movie-only
#   - id: tv-shows
#     name: TV Shows
#     section: TV Shows
#     media_type: tv
#     arr:
#       root_folder: /data/tv
#       quality_profile: HD-1080p
#       series_type: standard            # tv-only
#       instance:               # optional per-library *arr instance; falls back to global block
#         url: http://localhost:8989
#         api_key: YOUR_SONARR_API_KEY

# Optional: Tautulli watch-history integration
# Supplements Plex's own watch history with history from Tautulli, weighted
# the same way. Mainly useful for shared/external users whose Plex-native
# history retention is thin. Users are matched to Plex accounts by email
# (falls back to username). Disabled by default; if unreachable or a user
# can't be matched, Curatarr silently falls back to Plex-only history.
tautulli:
  enabled: false
  url: http://YOUR_TAUTULLI_URL:8181  # e.g. http://192.168.1.10:8181
  api_key: YOUR_TAUTULLI_API_KEY  # Settings -> Web Interface -> API Key

# =============================================================================
# OPTIONAL MODULE FILES (in this directory)
# =============================================================================
# For advanced configuration, create these optional files alongside config.yml:
#
#   tuning.yml    - Display options, weights, quality filters, scoring params
#   trakt.yml     - Trakt.tv integration (sync lists, import watchlist)
#   radarr.yml    - Radarr integration (auto-add movies)
#   sonarr.yml    - Sonarr integration (auto-add shows)
#
# Copy from *.example.yml files and customize as needed.
# =============================================================================
